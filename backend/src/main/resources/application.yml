server:
  port: 8081

spring:
  application:
    name: dms

  datasource:
    url: jdbc:mysql://localhost:3306/dms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Sayak@2005
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: DmsHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000
  refresh-expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  default-produces-media-type: application/json

# Application-level config (access via @Value or @ConfigurationProperties)
app:
  name: Hyundai DMS
  version: 1.0.0
  security:
    max-failed-attempts: 5
    lock-duration-minutes: 30
  pagination:
    default-page-size: 15
    max-page-size: 100
  stock:
    low-stock-threshold: 3

logging:
  config: classpath:logback-spring.xml
  level:
    com.hyundai.dms: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
